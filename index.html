    // --- 莫蘭迪色系分類樣式 ---
    const getTypeStyle = (type) => {
      switch(type) {
        case 'food': return 'text-[#B08A8B] border-[#B08A8B]/40 bg-[#B08A8B]/5';
        case 'attraction': return 'text-[#879782] border-[#879782]/40 bg-[#879782]/5';
        case 'transport': return 'text-[#7A8B99] border-[#7A8B99]/40 bg-[#7A8B99]/5';
        case 'hotel': return 'text-[#B29D82] border-[#B29D82]/40 bg-[#B29D82]/5';
        case 'flight': return 'text-[#8A819C] border-[#8A819C]/40 bg-[#8A819C]/5';
        default: return 'text-gray-400 border-gray-200 bg-gray-50';
      }
    };

    function App() {
      const [user, setUser] = useState(null);
      const [authError, setAuthError] = useState(null);
      const [trips, setTrips] = useState([]);
      const [activeTab, setActiveTab] = useState('itinerary'); 
      const [selectedDayIdx, setSelectedDayIdx] = useState(0);
      const [selectedEvent, setSelectedEvent] = useState(null); 
      const [isEditing, setIsEditing] = useState(false);
      const [editFormData, setEditFormData] = useState(null);
      
      const [expenses, setExpenses] = useState([
        { id: 1, title: "星宇機票 (兩人)", amount: 56000, currency: "TWD" },
        { id: 2, title: "租車預約 (預估)", amount: 45000, currency: "JPY" }
      ]);
      const [newExpTitle, setNewExpTitle] = useState("");
      const [newExpAmt, setNewExpAmt] = useState("");

      // --- Firebase 認證 ---
      useEffect(() => {
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (err) { 
            console.error("Auth failed", err);
            setAuthError(err.code || err.message);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      // --- 雲端資料同步 ---
      useEffect(() => {
        if (!user) return;
        const tripDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'itinerary', 'master_v2');
        const unsubscribe = onSnapshot(tripDocRef, (snapshot) => {
          if (snapshot.exists()) {
            setTrips(snapshot.data().content);
          } else {
            setDoc(tripDocRef, { content: initialTripData });
          }
        }, (error) => console.error("Sync error:", error));
        return () => unsubscribe();
      }, [user]);

      const saveToCloud = async (newTrips) => {
        if (!user) return;
        const tripDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'itinerary', 'master_v2');
        await setDoc(tripDocRef, { content: newTrips });
      };

      const handleSaveEdit = async () => {
        const newTrips = [...trips];
        const typeMap = { 'food': 'FOOD', 'flight': 'FLIGHT', 'transport': 'TRANSPORT', 'hotel': 'ACCOMMODATION', 'attraction': 'SIGHTSEEING' };
        if (editFormData.isNew) {
          newTrips[editFormData.dayIdx].events.push({
            ...editFormData,
            typeText: typeMap[editFormData.type] || 'SIGHTSEEING',
            tags: [],
            modalDetails: { descriptions: [editFormData.desc] }
          });
        } else {
          newTrips[editFormData.dayIdx].events[editFormData.eventIdx] = {
            ...newTrips[editFormData.dayIdx].events[editFormData.eventIdx],
            time: editFormData.time,
            title: editFormData.title,
            desc: editFormData.desc,
            type: editFormData.type,
            typeText: typeMap[editFormData.type] || 'SIGHTSEEING',
          };
        }
        newTrips[editFormData.dayIdx].events.sort((a, b) => a.time.localeCompare(b.time));
        await saveToCloud(newTrips);
        setIsEditing(false);
      };

      const handleDeleteEvent = async () => {
        if (window.confirm("確定要刪除這個行程嗎？刪掉就找不回來囉！😱")) {
          const newTrips = [...trips];
          newTrips[selectedEvent.dayIdx].events.splice(selectedEvent.eventIdx, 1);
          await saveToCloud(newTrips);
          setSelectedEvent(null);
        }
      };

      const handlePdfUpload = async (e) => {
        const file = e.target.files[0];
        if (!file || file.type !== 'application/pdf') return alert("僅支援 PDF 喔！");
        const newPdf = { name: file.name, url: URL.createObjectURL(file) };
        const newTrips = [...trips];
        const event = newTrips[selectedEvent.dayIdx].events[selectedEvent.eventIdx];
        if (!event.modalDetails) event.modalDetails = {};
        if (!event.modalDetails.pdfs) event.modalDetails.pdfs = [];
        if (event.modalDetails.pdfs.length >= 2) return alert("上限 2 份喔！");
        event.modalDetails.pdfs.push(newPdf);
        await saveToCloud(newTrips);
        setSelectedEvent({ ...event, dayIdx: selectedEvent.dayIdx, eventIdx: selectedEvent.eventIdx });
      };

      const handleAddExpense = () => {
        if (!newExpTitle || !newExpAmt) return;
        setExpenses([...expenses, { id: Date.now(), title: newExpTitle, amount: Number(newExpAmt), currency: "JPY" }]);
        setNewExpTitle("");
        setNewExpAmt("");
      };

      // --- 錯誤處理介面 ---
      if (authError === 'auth/configuration-not-found') {
        return (
          <div className="h-screen flex flex-col items-center justify-center p-8 bg-[#FDFCFB] text-center font-sans">
            <span className="text-5xl mb-6">🛠️</span>
            <h2 className="text-xl font-bold text-[#8B2C2C] mb-4">Firebase 設定未完成</h2>
            <div className="text-sm text-gray-600 mb-6 leading-relaxed">
              哎呀！你還沒在 Firebase 控制台開啟「匿名登入」功能。<br/>
              請前往：<br/>
              <div className="font-bold my-2 px-2 py-1 bg-gray-100 rounded inline-block">
                Authentication {' > '} Sign-in method {' > '} Add new provider {' > '} Anonymous
              </div><br/>
              將其設為 <strong>Enable</strong> 後儲存，重新整理網頁即可。
            </div>
            <button onClick={() => window.location.reload()} className="bg-[#8B2C2C] text-white px-6 py-2 rounded-full font-bold shadow-md">重新整理</button>
          </div>
        );
      }

      if (trips.length === 0 && !authError) return <div className="h-screen flex items-center justify-center font-serif text-gray-400">Loading Journey...</div>;

      const currentDayData = trips[selectedDayIdx];
      const firstEventTime = currentDayData?.events?.length > 0 ? currentDayData.events[0].time : "--:--";
      const firstEventTitle = currentDayData?.events?.length > 0 ? currentDayData.events[0].title : "無行程";
      const nextEventTime = currentDayData?.events?.length > 1 ? currentDayData.events[1].time : "18:00";

      return (
        <div className="max-w-md mx-auto h-screen bg-[#FDFCFB] text-[#333333] flex flex-col font-serif overflow-hidden shadow-2xl relative">
          <style dangerouslySetInnerHTML={{__html: `
            @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
            .font-serif { font-family: 'Noto Serif TC', serif; }
            .font-sans { font-family: 'Noto Sans TC', sans-serif; }
            .hide-scrollbar::-webkit-scrollbar { display: none; }
            .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
            .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
            @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
            @keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
            .stamp-tag { border: 1px solid #8B2C2C; color: #8B2C2C; transform: rotate(-8deg); padding: 2px 6px; font-size: 0.65rem; font-weight: 700; border-radius: 2px; background: rgba(255,255,255,0.8); }
            .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
          `}} />

          {/* --- Header --- */}
          <header className="px-5 pt-8 pb-2 flex flex-col bg-[#FDFCFB] z-10 shrink-0">
            <div className="flex justify-between items-center w-full relative">
              <button className="w-8 h-8 rounded-full bg-black/60 text-white flex items-center justify-center text-sm z-20">✕</button>
              <div className="absolute left-0 right-0 flex flex-col items-center justify-center pointer-events-none">
                <h1 className="text-[1.3rem] font-bold tracking-widest text-[#222]">🏔️ 10月中部旅行</h1>
                <span className="border border-[#E0Dcd0] bg-[#F7F5F0] rounded-full px-2.5 py-0.5 text-[0.55rem] text-[#888] font-sans tracking-widest shadow-sm mt-0.5">2026/10/01-10/06</span>
              </div>
            </div>
          </header>

          {/* --- 日期欄位 --- */}
          <div className="flex justify-between w-full px-6 py-4 hide-scrollbar border-b border-gray-100 bg-[#FDFCFB] shrink-0">
            {trips.map((day, idx) => (
              <button key={idx} onClick={() => setSelectedDayIdx(idx)} className="flex flex-col items-center justify-center w-10 relative cursor-pointer group">
                <span className={`text-[0.65rem] tracking-wider mb-1 font-sans ${selectedDayIdx === idx ? 'text-black font-semibold' : 'text-gray-400'}`}>{day.day}</span>
                <span className={`text-xl transition-all ${selectedDayIdx === idx ? 'font-bold text-black scale-110' : 'text-gray-400 font-medium'}`}>{day.date.split('/')[1]}</span>
                {selectedDayIdx === idx && <div className="absolute -bottom-3 w-1 h-1 bg-[#8B2C2C] rounded-full"></div>}
              </button>
            ))}
          </div>

          <main className="flex-1 overflow-y-auto pb-32 bg-[#FDFCFB] relative">
            {activeTab === 'itinerary' && (
              <div className="animate-fade-in flex flex-col px-5">
                <div className="py-4 flex gap-4 items-stretch h-56 relative z-10">
                  <div className="w-6 flex items-center justify-center"><span className="text-[1.35rem] font-serif tracking-widest text-[#222]" style={{ writingMode: 'vertical-rl', textOrientation: 'upright' }}>{currentDayData?.heroTitle}</span></div>
                  <div className="relative flex-1 rounded-sm overflow-hidden shadow-sm">
                    <img src={currentDayData?.heroImage} className="absolute inset-0 w-full h-full object-cover" />
                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/10 to-transparent"></div>
                    <div className="absolute bottom-4 left-4 right-4 text-white">
                      <div className="flex items-center gap-2 mb-1.5"><span className="border border-white/60 px-1.5 py-0.5 text-[0.55rem] font-sans tracking-widest bg-black/20">DAY {selectedDayIdx + 1}</span><span className="text-[0.6rem] font-sans tracking-widest opacity-90">📍 {currentDayData?.heroSubtitle}</span></div>
                      <h2 className="text-[1.35rem] font-serif font-bold tracking-widest leading-snug">{currentDayData?.heroDesc}</h2>
                    </div>
                  </div>
                </div>

                {/* Weather & Outfit */}
                <div className="py-4 border-b border-gray-100 px-2">
                  <div className="flex justify-between items-center mb-4">
                    {currentDayData?.weather.hourly.map((h, i) => (
                      <div key={i} className="flex flex-col items-center">
                        <span className="text-[0.65rem] text-gray-500 font-sans mb-1">{h.time}</span>
                        <span className="text-xl mb-1">{h.icon}</span>
                        <span className="text-sm font-medium">{h.temp}</span>
                      </div>
                    ))}
                  </div>
                  <div className="bg-[#F8F7F4] border border-[#EBE7DF] rounded-md p-3 flex items-start gap-3 shadow-sm relative overflow-hidden">
                    <div className="absolute left-0 top-0 bottom-0 w-1 bg-[#D4C8B8]"></div>
                    <span className="text-[1.4rem]">🧥</span>
                    <div className="flex flex-col">
                      <span className="text-[0.6rem] text-[#A5998A] font-bold uppercase mb-1">Outfit Guide</span>
                      <span className="text-xs text-[#555] leading-relaxed">{currentDayData?.weather.outfit}</span>
                    </div>
                  </div>
                </div>

                {/* Timeline */}
                <div className="py-8">
                  {currentDayData?.events.map((event, i) => (
                    <div key={i} className="flex relative mb-10 cursor-pointer group" onClick={() => setSelectedEvent({...event, dayIdx: selectedDayIdx, eventIdx: i})}>
                      <div className="w-16 text-right pr-4 pt-1"><span className="text-lg font-bold tracking-wider">{event.time}</span></div>
                      <div className="relative w-4 flex justify-center">
                        <div className="absolute top-3 bottom-[-40px] w-[1px] bg-[#E8E6E1]"></div>
                        <div className="w-[5px] h-[5px] rounded-full bg-[#8B2C2C] mt-[10px] z-10 border border-white shadow-sm group-hover:scale-125 transition-transform"></div>
                      </div>
                      <div className="flex-1 pl-4 pb-2">
                        <h4 className="text-[1.35rem] font-bold text-[#222] leading-tight mb-2 tracking-wide">{event.title}</h4>
                        <span className={`text-[0.6rem] tracking-[0.2em] font-sans px-1.5 py-[1px] rounded-[3px] border ${getTypeStyle(event.type)}`}>{event.typeText}</span>
                        <p className="text-[0.85rem] text-[#666] mt-2 line-clamp-2">{event.desc}</p>
                      </div>
                    </div>
                  ))}
                </div>

                <button onClick={() => { setEditFormData({ dayIdx: selectedDayIdx, time: "12:00", title: "", desc: "", type: "attraction", isNew: true }); setIsEditing(true); }} className="w-full py-3 border border-dashed border-[#D4C8B8] text-[#A5998A] rounded-sm text-sm tracking-widest flex items-center justify-center gap-2 mb-24 hover:bg-gray-50">+ 新增行程</button>
              </div>
            )}

            {/* --- Tools Tab --- */}
            {activeTab === 'tools' && (
              <div className="px-6 py-6 space-y-8 animate-fade-in font-sans relative">
                <h2 className="text-2xl font-serif font-bold tracking-widest text-center mb-6">實用工具</h2>
                <section className="border-t border-gray-200 pt-6">
                  <h3 className="text-sm font-bold text-[#8A819C] tracking-[0.2em] uppercase mb-4 flex items-center gap-1.5">✦ Flight Info</h3>
                  <div className="space-y-4 text-sm text-[#333]">
                    <div className="flex justify-between items-end border-b border-dashed border-gray-200 pb-2">
                      <span className="text-gray-500 font-serif">去程 10/01</span>
                      <span className="font-bold text-base font-serif text-[#222]">JX838 (14:55-18:45)</span>
                    </div>
                    <div className="flex justify-between items-end">
                      <span className="text-gray-500 font-serif">回程 10/06</span>
                      <span className="font-bold text-base font-serif text-[#222]">JX839 (19:55-23:00)</span>
                    </div>
                  </div>
                </section>
                <section className="border-t border-gray-200 pt-6">
                  <h3 className="text-sm font-bold text-[#B29D82] tracking-[0.2em] uppercase mb-4 flex items-center gap-1.5">✦ Accommodation</h3>
                  <ul className="space-y-4 text-sm">
                    <li><div className="text-xs text-gray-400">10/01 名古屋</div><div className="font-bold font-serif text-[#222]">ixyz杜</div></li>
                    <li><div className="text-xs text-gray-400">10/02 松本</div><div className="font-bold font-serif text-[#222]">Tabino Hotel lit Matsumoto</div></li>
                    <li><div className="text-xs text-gray-400">10/03-05 高山</div><div className="font-bold font-serif text-[#222]">高山 東急ステイ 飛騨高山</div></li>
                    <li><div className="text-xs text-gray-400">10/05 金澤</div><div className="font-bold font-serif text-[#222]">Onyado Nono Kanazawa</div></li>
                  </ul>
                </section>
                <section className="border-t border-gray-200 pt-6">
                  <h3 className="text-sm font-bold text-[#8B2C2C] tracking-[0.2em] uppercase mb-4 flex items-center gap-1.5">✦ Emergency</h3>
                  <ul className="space-y-3 text-sm text-[#8B2C2C]">
                    <li className="flex justify-between"><span>報警 / 救護車</span><span className="font-mono font-bold text-lg">110 / 119</span></li>
                    <li className="flex justify-between border-t border-red-100 pt-3 mt-1">
                      <span>駐大阪辦事處急難救助</span>
                      <a href="tel:+819087944568" className="font-mono font-bold underline">+81-90-8794-4568</a>
                    </li>
                  </ul>
                </section>
              </div>
            )}

            {/* --- Budget Tab --- */}
            {activeTab === 'budget' && (
              <div className="px-6 py-6 animate-fade-in font-sans relative">
                <h2 className="text-2xl font-serif font-bold tracking-widest text-center mb-6">預算控制</h2>
                <div className="bg-[#F8F7F4] border border-[#EBE7DF] p-6 rounded-sm mb-8 text-center relative shadow-sm">
                  <div className="absolute left-0 top-0 bottom-0 w-1 bg-[#879782]"></div>
                  <h3 className="text-xs tracking-[0.2em] text-[#879782] uppercase mb-2 font-bold">Total Expenses</h3>
                  <div className="text-3xl font-bold font-serif text-[#222]">
                    ¥ {expenses.filter(e => e.currency === 'JPY').reduce((acc, curr) => acc + curr.amount, 0).toLocaleString()}
                  </div>
                  <div className="text-xs text-gray-400 mt-2">+ NT$ {expenses.filter(e => e.currency === 'TWD').reduce((acc, curr) => acc + curr.amount, 0).toLocaleString()}</div>
                </div>
                <div className="flex gap-2 mb-8">
                  <input type="text" placeholder="項目" className="flex-1 bg-transparent border-b border-gray-300 px-2 py-2 text-sm outline-none focus:border-[#879782]" value={newExpTitle} onChange={(e) => setNewExpTitle(e.target.value)} />
                  <input type="number" placeholder="金額" className="w-24 bg-transparent border-b border-gray-300 px-2 py-2 text-sm outline-none focus:border-[#879782]" value={newExpAmt} onChange={(e) => setNewExpAmt(e.target.value)} />
                  <button onClick={handleAddExpense} className="bg-[#879782] text-white px-4 py-2 text-xs tracking-wider rounded-sm">ADD</button>
                </div>
                <div className="space-y-4">
                  {expenses.map(exp => (
                    <div key={exp.id} className="flex justify-between items-end border-b border-dashed border-gray-100 pb-2">
                      <span className="text-[#444] font-serif text-sm">{exp.title}</span>
                      <span className="font-mono text-sm text-[#222]">{exp.currency === 'JPY' ? '¥' : 'NT$'} {exp.amount.toLocaleString()}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </main>

          {/* --- Bottom Nav --- */}
          <nav className="absolute bottom-0 w-full bg-[#FDFCFB]/90 backdrop-blur border-t border-gray-100 px-8 py-3 flex justify-between items-center pb-safe z-30">
            {['itinerary', 'tools', 'budget'].map(t => (
              <button key={t} onClick={() => setActiveTab(t)} className={`text-xs tracking-widest uppercase transition-all ${activeTab === t ? 'text-black font-bold' : 'text-gray-400'}`}>{t}</button>
            ))}
          </nav>

          {/* Event Modal */}
          {selectedEvent && (
            <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/40 backdrop-blur-sm animate-fade-in" onClick={() => setSelectedEvent(null)}>
              <div className="bg-[#FDFCFB] w-full max-w-md h-[90vh] rounded-t-2xl overflow-hidden flex flex-col animate-slide-up shadow-2xl" onClick={e => e.stopPropagation()}>
                <div className="px-6 py-5 flex justify-between items-center border-b border-gray-100/80 bg-white/50">
                  <div className="flex items-center gap-3">
                    <span className={`border px-2 py-0.5 text-[0.65rem] uppercase ${getTypeStyle(selectedEvent.type)}`}>{selectedEvent.typeText}</span>
                    <span className="text-sm font-serif text-gray-500 tracking-wider">🕒 {selectedEvent.time}</span>
                  </div>
                  <div className="flex gap-4">
                    <button onClick={() => { setEditFormData(selectedEvent); setIsEditing(true); }} className="text-gray-400 hover:text-black">✏️</button>
                    <button onClick={handleDeleteEvent} className="text-gray-400 hover:text-[#8B2C2C]">🗑️</button>
                    <button onClick={() => setSelectedEvent(null)} className="text-2xl font-light hover:text-black">×</button>
                  </div>
                </div>
                <div className="flex-1 overflow-y-auto px-6 py-8 pb-32 hide-scrollbar">
                  <h2 className="text-[1.65rem] font-serif font-bold text-[#222] mb-3 leading-snug">{selectedEvent.title}</h2>
                  {selectedEvent.type === 'hotel' && (
                    <div className="mb-8 bg-white border border-gray-100 p-4 rounded-sm shadow-sm relative overflow-hidden">
                      <div className="absolute left-0 top-0 bottom-0 w-1 bg-[#D4C8B8]"></div>
                      <span className="text-[0.65rem] text-[#222] tracking-[0.2em] uppercase font-bold border-b block mb-3 pb-1">住宿憑證 (VOUCHERS)</span>
                      <div className="space-y-2.5">
                        {selectedEvent.modalDetails?.pdfs?.map((pdf, idx) => (
                          <div key={idx} className="flex justify-between items-center bg-[#F8F7F4] p-2.5 border border-[#EBE7DF] rounded-sm">
                            <span className="text-xs truncate max-w-[150px] text-gray-600">📄 {pdf.name}</span>
                            <div className="flex gap-2">
                              <a href={pdf.url} target="_blank" className="text-[0.6rem] bg-[#879782] text-white px-3 py-1.5 rounded-sm">預覽</a>
                            </div>
                          </div>
                        ))}
                        <label className="block text-center border border-dashed border-[#D4C8B8] p-3 rounded-sm text-[0.65rem] text-[#A5998A] cursor-pointer">
                          + 上傳 PDF <input type="file" accept="application/pdf" className="hidden" onChange={handlePdfUpload} />
                        </label>
                      </div>
                    </div>
                  )}
                  <div className="space-y-6 text-[0.85rem] text-gray-600 leading-relaxed font-sans text-justify relative pl-4">
                    <div className="absolute left-0 top-1 bottom-1 w-[1px] bg-gray-200"></div>
                    {selectedEvent.modalDetails?.descriptions?.map((d, i) => (
                      <div key={i} className="relative"><div className="absolute left-[-20px] top-2 w-2 h-2 rounded-full bg-[#D4C8B8]"></div>{d}</div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Edit Modal */}
          {isEditing && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/60 p-5 backdrop-blur-sm animate-fade-in" onClick={() => setIsEditing(false)}>
              <div className="bg-[#FDFCFB] w-full max-w-sm p-8 rounded-xl shadow-2xl font-sans animate-slide-up" onClick={e => e.stopPropagation()}>
                 <h3 className="font-serif font-bold text-xl mb-6 tracking-widest text-[#222]">行程細節</h3>
                 <input className="w-full border-b border-gray-300 p-2 mb-6 rounded-none outline-none focus:border-[#879782] font-serif transition-colors bg-transparent" value={editFormData.title} onChange={e => setEditFormData({...editFormData, title: e.target.value})} placeholder="輸入標題..." />
                 <input className="w-full border-b border-gray-300 p-2 mb-8 rounded-none outline-none focus:border-[#879782] font-mono transition-colors bg-transparent" type="time" value={editFormData.time} onChange={e => setEditFormData({...editFormData, time: e.target.value})} />
                 <div className="flex gap-3">
                   <button onClick={() => setIsEditing(false)} className="flex-1 py-3 bg-gray-100 text-gray-500 rounded-sm text-xs tracking-widest font-bold uppercase">Cancel</button>
                   <button onClick={handleSaveEdit} className="flex-1 py-3 bg-[#879782] text-white rounded-sm text-xs tracking-widest font-bold uppercase shadow-md">Save</button>
                 </div>
              </div>
            </div>
          )}

          {/* 浮動卡片 */}
          {activeTab === 'itinerary' && (
            <div className="absolute bottom-16 left-4 right-4 bg-white/95 backdrop-blur-md border border-gray-100 rounded-xl shadow-[0_10px_30px_rgba(0,0,0,0.1)] p-4 flex items-center z-20 font-sans">
              <div className="flex-1 px-4 border-r border-gray-100">
                <div className="flex items-center gap-2 mb-1.5"><span className="text-xl font-bold font-serif text-[#222]">{firstEventTime}</span><span className="text-[0.6rem] border border-[#879782]/30 text-[#879782] px-1.5 rounded-full font-bold">NOW</span></div>
                <div className="text-sm font-bold text-[#333] truncate tracking-tight">{firstEventTitle}</div>
              </div>
              <div className="w-24 text-right pl-4">
                <span className="text-sm font-serif font-bold text-[#8B2C2C]">{nextEventTime}</span>
                <div className="text-[0.6rem] text-gray-400 font-bold tracking-widest uppercase">Next Up</div>
              </div>
            </div>
          )}
        </div>
      );
    }
    
    // 將 React 應用程式掛載到畫面
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
