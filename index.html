    // --- 莫蘭迪色系分類樣式 ---
    const getTypeStyle = (type) => {
      switch(type) {
        case 'food': return 'text-[#B08A8B] border-[#B08A8B]/40 bg-[#B08A8B]/5';
        case 'attraction': return 'text-[#879782] border-[#879782]/40 bg-[#879782]/5';
        case 'transport': return 'text-[#7A8B99] border-[#7A8B99]/40 bg-[#7A8B99]/5';
        case 'hotel': return 'text-[#B29D82] border-[#B29D82]/40 bg-[#B29D82]/5';
        case 'flight': return 'text-[#8A819C] border-[#8A819C]/40 bg-[#8A819C]/5';
        default: return 'text-gray-400 border-gray-200 bg-gray-50';
      }
    };

    function App() {
      const [user, setUser] = useState(null);
      const [authError, setAuthError] = useState(null);
      const [trips, setTrips] = useState([]);
      const [activeTab, setActiveTab] = useState('itinerary'); 
      const [selectedDayIdx, setSelectedDayIdx] = useState(0);
      const [selectedEvent, setSelectedEvent] = useState(null); 
      const [isEditing, setIsEditing] = useState(false);
      const [editFormData, setEditFormData] = useState(null);
      
      const [expenses, setExpenses] = useState([
        { id: 1, title: "星宇機票 (兩人)", amount: 56000, currency: "TWD" },
        { id: 2, title: "租車預約 (預估)", amount: 45000, currency: "JPY" }
      ]);
      const [newExpTitle, setNewExpTitle] = useState("");
      const [newExpAmt, setNewExpAmt] = useState("");

      // --- Firebase 認證 ---
      useEffect(() => {
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (err) { 
            console.error("Auth failed", err);
            setAuthError(err.code || err.message);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      // --- 雲端資料同步 ---
      useEffect(() => {
        if (!user) return;
        const tripDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'itinerary', 'master_v2');
        const unsubscribe = onSnapshot(tripDocRef, (snapshot) => {
          if (snapshot.exists()) {
            let data = snapshot.data().content;
            let needsUpdate = false;
            
            // 魔法機制：修復圖片與不完整的天氣資料
            data = data.map((day, idx) => {
              let updatedDay = { ...day };
              
              if (updatedDay.heroImage && updatedDay.heroImage.includes('unsplash')) {
                needsUpdate = true;
                updatedDay.heroImage = window.fallbackImages[idx % 6];
              }

              // 修復天氣陣列長度不完整的問題
              if (updatedDay.weather && updatedDay.weather.hourly && updatedDay.weather.hourly.length < 5) {
                needsUpdate = true;
                updatedDay.weather.hourly = initialTripData[idx].weather.hourly;
              }

              return updatedDay;
            });

            if (needsUpdate) {
              setDoc(tripDocRef, { content: data }); // 寫回修正後的資料
            }
            setTrips(data);
          } else {
            setDoc(tripDocRef, { content: initialTripData });
          }
        }, (error) => console.error("Sync error:", error));
        return () => unsubscribe();
      }, [user]);

      const saveToCloud = async (newTrips) => {
        if (!user) return;
        const tripDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'itinerary', 'master_v2');
        await setDoc(tripDocRef, { content: newTrips });
      };

      const handleSaveEdit = async () => {
        if (!editFormData.title || !editFormData.time) {
          alert("標題和時間是必填的喔！✨");
          return;
        }

        const newTrips = [...trips];
        const typeMap = { 'food': 'FOOD', 'flight': 'FLIGHT', 'transport': 'TRANSPORT', 'hotel': 'ACCOMMODATION', 'attraction': 'SIGHTSEEING' };
        
        // 整理外層基本資料
        const baseEventData = {
          time: editFormData.time,
          title: editFormData.title,
          desc: editFormData.desc,
          type: editFormData.type,
          typeText: typeMap[editFormData.type] || 'SIGHTSEEING',
          map: editFormData.map || "",
        };

        // 整理內層詳細資料
        const modalDetails = {
          address: editFormData.address || "",
          phone: editFormData.phone || "",
          website: editFormData.website || "",
          reservationNo: editFormData.reservationNo || "",
          // 將文字框的換行切分成陣列，過濾掉空行
          descriptions: editFormData.descriptionsText ? editFormData.descriptionsText.split('\n').filter(t=>t.trim()!=='') : []
        };

        if (editFormData.isNew) {
          newTrips[editFormData.dayIdx].events.push({
            ...baseEventData,
            tags: [], // 新增預設沒標籤
            modalDetails: modalDetails
          });
        } else {
          // 保留舊的 tags 和其他沒編輯到的 modalDetails (例如 pdfs)
          const oldEvent = newTrips[editFormData.dayIdx].events[editFormData.eventIdx];
          newTrips[editFormData.dayIdx].events[editFormData.eventIdx] = {
            ...oldEvent,
            ...baseEventData,
            modalDetails: {
              ...oldEvent.modalDetails,
              ...modalDetails
            }
          };
        }
        newTrips[editFormData.dayIdx].events.sort((a, b) => a.time.localeCompare(b.time));
        await saveToCloud(newTrips);
        setIsEditing(false);
      };

      const handleDeleteEvent = async () => {
        if (window.confirm("確定要刪除這個行程嗎？刪掉就找不回來囉！😱")) {
          const newTrips = [...trips];
          newTrips[selectedEvent.dayIdx].events.splice(selectedEvent.eventIdx, 1);
          await saveToCloud(newTrips);
          setSelectedEvent(null);
        }
      };

      const handlePdfUpload = async (e) => {
        const file = e.target.files[0];
        if (!file || file.type !== 'application/pdf') return alert("僅支援 PDF 喔！");
        const newPdf = { name: file.name, url: URL.createObjectURL(file) };
        const newTrips = [...trips];
        const event = newTrips[selectedEvent.dayIdx].events[selectedEvent.eventIdx];
        if (!event.modalDetails) event.modalDetails = {};
        if (!event.modalDetails.pdfs) event.modalDetails.pdfs = [];
        if (event.modalDetails.pdfs.length >= 2) return alert("上限 2 份喔！");
        event.modalDetails.pdfs.push(newPdf);
        await saveToCloud(newTrips);
        setSelectedEvent({ ...event, dayIdx: selectedEvent.dayIdx, eventIdx: selectedEvent.eventIdx });

                     <div className="w-1/3">
                       <label className="block text-[0.6rem] text-[#879782] tracking-[0.2em] uppercase mb-1 font-bold">時間 Time</label>
                       <input className="w-full border-b border-gray-300 p-2 rounded-none outline-none focus:border-[#879782] font-mono transition-colors bg-transparent text-lg" type="time" value={editFormData.time} onChange={e => setEditFormData({...editFormData, time: e.target.value})} />
                     </div>
                     <div className="flex-1">
                       <label className="block text-[0.6rem] text-[#879782] tracking-[0.2em] uppercase mb-1 font-bold">類型 Category</label>
                       <select className="w-full border-b border-gray-300 p-2 rounded-none outline-none focus:border-[#879782] font-sans transition-colors bg-transparent text-base" value={editFormData.type} onChange={e => setEditFormData({...editFormData, type: e.target.value})}>
                         <option value="attraction">📷 景點</option>
                         <option value="food">🍴 美食</option>
                         <option value="transport">🚙 交通</option>
                         <option value="hotel">🛌 住宿</option>
                         <option value="flight">✈️ 航班</option>
                       </select>
                     </div>
                   </div>
                   
                   <div>
                     <label className="block text-[0.6rem] text-[#879782] tracking-[0.2em] uppercase mb-1 font-bold">標題 Title</label>
                     <input className="w-full border-b border-gray-300 p-2 rounded-none outline-none focus:border-[#879782] font-serif transition-colors bg-transparent text-base" value={editFormData.title} onChange={e => setEditFormData({...editFormData, title: e.target.value})} placeholder="例：午餐：味藏天國" />
                   </div>

                   <div>
                     <label className="block text-[0.6rem] text-[#879782] tracking-[0.2em] uppercase mb-1 font-bold">列表簡介 Short Desc</label>
                     <input className="w-full border-b border-gray-300 p-2 rounded-none outline-none focus:border-[#879782] font-sans transition-colors bg-transparent text-sm" value={editFormData.desc} onChange={e => setEditFormData({...editFormData, desc: e.target.value})} placeholder="顯示在行程列表上的短敘述" />
                   </div>

                   <div className="border-t border-dashed border-gray-200 my-2"></div>

                   {/* 詳細資訊 */}
                   <div>
                     <label className="block text-[0.6rem] text-[#A5998A] tracking-[0.2em] uppercase mb-1 font-bold">地址 Address</label>
                     <input className="w-full border-b border-gray-300 p-2 rounded-none outline-none focus:border-[#879782] font-sans transition-colors bg-transparent text-sm" value={editFormData.address} onChange={e => setEditFormData({...editFormData, address: e.target.value})} placeholder="導航用地址" />
                   </div>

                   <div>
                     <label className="block text-[0.6rem] text-[#A5998A] tracking-[0.2em] uppercase mb-1 font-bold">地圖連結 Map Link</label>
                     <input className="w-full border-b border-gray-300 p-2 rounded-none outline-none focus:border-[#879782] font-sans transition-colors bg-transparent text-sm" value={editFormData.map} onChange={e => setEditFormData({...editFormData, map: e.target.value})} placeholder="https://maps.app.goo.gl/..." />
                   </div>

                   <div className="flex gap-4">
                     <div className="flex-1">
                       <label className="block text-[0.6rem] text-[#A5998A] tracking-[0.2em] uppercase mb-1 font-bold">電話 Phone</label>
                       <input className="w-full border-b border-gray-300 p-2 rounded-none outline-none focus:border-[#879782] font-mono transition-colors bg-transparent text-sm" value={editFormData.phone} onChange={e => setEditFormData({...editFormData, phone: e.target.value})} placeholder="0577-..." />
                     </div>
                     <div className="flex-1">
                       <label className="block text-[0.6rem] text-[#A5998A] tracking-[0.2em] uppercase mb-1 font-bold">預約代號 Booking No.</label>
                       <input className="w-full border-b border-gray-300 p-2 rounded-none outline-none focus:border-[#879782] font-mono transition-colors bg-transparent text-sm" value={editFormData.reservationNo} onChange={e => setEditFormData({...editFormData, reservationNo: e.target.value})} placeholder="無可留空" />
                     </div>
                   </div>

                   <div>
                     <label className="block text-[0.6rem] text-[#A5998A] tracking-[0.2em] uppercase mb-1 font-bold">官方網站 Website</label>
                     <input className="w-full border-b border-gray-300 p-2 rounded-none outline-none focus:border-[#879782] font-sans transition-colors bg-transparent text-sm" value={editFormData.website} onChange={e => setEditFormData({...editFormData, website: e.target.value})} placeholder="https://..." />
                   </div>

                   <div>
                     <label className="block text-[0.6rem] text-[#A5998A] tracking-[0.2em] uppercase mb-1 font-bold">詳細內文 Details</label>
                     <textarea className="w-full border border-gray-300 p-3 rounded-md outline-none focus:border-[#879782] font-sans transition-colors bg-transparent text-sm resize-none" rows="4" value={editFormData.descriptionsText} onChange={e => setEditFormData({...editFormData, descriptionsText: e.target.value})} placeholder="輸入詳細介紹或筆記，換行會自動分段喔！" />
                   </div>
                 </div>
                 
                 <div className="p-4 bg-white border-t border-gray-100 flex gap-3 pb-safe rounded-b-2xl sm:rounded-b-xl shrink-0">
                   <button onClick={() => setIsEditing(false)} className="flex-1 py-3.5 bg-[#F8F7F4] text-gray-500 rounded-sm text-xs tracking-widest font-bold hover:bg-gray-200 transition-colors uppercase">取消</button>
                   <button onClick={handleSaveEdit} className="flex-1 py-3.5 bg-[#879782] text-white rounded-sm text-xs tracking-widest font-bold hover:bg-[#72826e] transition-colors uppercase shadow-md active:scale-95">儲存</button>
                 </div>
              </div>
            </div>
          )}

          {/* 浮動卡片 (升級版) */}
          {activeTab === 'itinerary' && (
            <div 
              className="absolute bottom-16 left-4 right-4 bg-[#FDFCFB]/95 backdrop-blur-md border border-gray-200 rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.08)] p-3 flex items-stretch z-20 font-sans cursor-pointer active:scale-[0.98] transition-transform"
              onClick={() => {
                if (firstEvent) {
                  setSelectedEvent({ ...firstEvent, dayIdx: selectedDayIdx, eventIdx: 0 });
                }
              }}
            >
              {/* GPS OFF 區塊 */}
              <div className="flex flex-col items-center justify-center px-3 border-r border-gray-200/80">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#A5998A" strokeWidth="1.5" className="mb-1">
                  <circle cx="12" cy="12" r="10"></circle>
                  <line x1="22" y1="2" x2="2" y2="22"></line>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <span className="text-[0.55rem] text-[#A5998A] font-bold tracking-widest leading-none mt-1">GPS<br/>OFF</span>
              </div>

              {/* 行程預覽區塊 */}
              <div className="flex-1 px-4 flex flex-col justify-center min-w-0">
                <div className="flex items-center gap-2 mb-1">
                  <span className="text-2xl font-bold font-serif text-[#222] leading-none">{firstEventTime}</span>
                  <span className="text-[0.55rem] border border-gray-300 text-gray-500 px-1.5 py-0.5 rounded tracking-widest">行程預覽</span>
                </div>
                <div className="text-[0.9rem] font-bold text-[#222] truncate mb-0.5 font-serif">{firstEventTitle}</div>
                <div className="text-[0.65rem] text-gray-500 truncate flex items-center gap-1">
                  <span className="text-gray-400">→</span> {nextEventTitle}
                </div>
              </div>

              {/* 下個時間區塊 */}
              <div className="flex flex-col items-center justify-center px-3 border-l border-gray-200/80 min-w-[70px]">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#666" strokeWidth="2" className="mb-1">
                  <circle cx="12" cy="12" r="10"></circle>
                  <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <span className="text-base font-bold font-serif text-[#222] leading-none">{nextEventTime}</span>
                <div className="text-[0.55rem] text-gray-500 tracking-widest mt-1">下個時間</div>
              </div>
            </div>
          )}
        </div>
      );
    }
    
    // 將 React 應用程式掛載到畫面
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
